<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andres's ZZZ Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-deep: #08080f;
    --bg-header: linear-gradient(135deg, #0d0d1a 0%, #16132e 50%, #1a0f2e 100%);
    --bg-section: linear-gradient(90deg, rgba(22,33,62,0.9), rgba(22,33,62,0.4));
    --bg-card: rgba(255,255,255,0.02);
    --bg-card-alt: rgba(255,255,255,0.035);
    --accent: #c4b5fd;
    --accent-glow: rgba(196,181,253,0.15);
    --text-primary: #e8e4f0;
    --text-secondary: #888;
    --text-muted: #6b6394;
    --text-dim: #555;
    --border-subtle: rgba(255,255,255,0.05);
    --green-bg: rgba(46,125,50,0.15);
    --green-text: #66bb6a;
    --green-border: #2e7d32;
    --yellow-bg: rgba(255,160,0,0.12);
    --yellow-text: #ffb74d;
    --yellow-border: #f57f17;
    --red-bg: rgba(198,40,40,0.15);
    --red-text: #ef5350;
    --red-border: #c62828;
  }

  body {
    font-family: 'Outfit', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: #e0e0e0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 0%, transparent 50%, rgba(0,0,0,0.4) 100%);
  }

  .header {
    background: var(--bg-header);
    border-bottom: 1px solid rgba(196,181,253,0.12);
    padding: 22px 28px 18px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
  }
  .title {
    font-size: 21px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(90deg, #c4b5fd 0%, #e8b4f8 25%, #c4b5fd 50%, #e8b4f8 75%, #c4b5fd 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    animation: titleShimmer 6s ease-in-out infinite;
  }
  @keyframes titleShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .subtitle { font-size: 12px; color: #8b83a8; letter-spacing: 0.5px; margin-top: 4px; }

  .tabs {
    display: flex; gap: 2px; border-radius: 10px; overflow: hidden;
    background: rgba(255,255,255,0.04); position: relative;
  }
  .tab {
    padding: 8px 20px; border: none; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    background: transparent; color: #555; transition: all 0.25s;
    position: relative;
  }
  .tab.active { background: var(--accent-glow); color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2px; background: var(--accent); border-radius: 2px;
  }
  .tab:hover:not(.active) { color: #999; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .filter-btn {
    padding: 5px 13px; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
    background: transparent; color: #666; transition: all 0.2s;
  }
  .filter-btn:active { transform: scale(0.94); }
  .filter-btn.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }
  .filter-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: #999; }
  .filter-sep { width: 1px; background: rgba(255,255,255,0.08); margin: 0 4px; align-self: stretch; }

  .content { padding: 18px 24px 50px; position: relative; z-index: 1; }

  .section-header {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 13px 16px; border: none; cursor: pointer;
    background: var(--bg-section); transition: all 0.2s;
    font-family: inherit; border-left: 3px solid var(--accent);
    position: relative; overflow: hidden;
  }
  .section-header.expanded { border-radius: 10px 10px 0 0; }
  .section-header.collapsed { border-radius: 10px; }
  .section-header:hover { filter: brightness(1.1); }
  .section-progress {
    position: absolute; bottom: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), rgba(196,181,253,0.3));
    border-radius: 0 2px 2px 0; transition: width 0.4s ease;
  }
  .section-icon { font-size: 18px; }
  .section-label {
    font-size: 13px; font-weight: 800; color: var(--accent);
    letter-spacing: 2.5px; text-transform: uppercase;
  }
  .section-count { font-size: 11px; color: var(--text-muted); margin-left: 2px; }
  .section-chevron {
    margin-left: auto; font-size: 10px; color: var(--text-muted);
    transition: transform 0.25s;
  }
  .section-chevron.open { transform: rotate(180deg); }

  .section-body {
    background: rgba(255,255,255,0.015);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    border: 1px solid var(--border-subtle); border-top: none;
    animation: fadeSlideIn 0.3s ease-out;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .agent-row {
    display: grid;
    grid-template-columns: 2fr auto auto auto auto;
    gap: 12px; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.025);
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .agent-row:nth-child(odd) { background: rgba(255,255,255,0.018); }
  .agent-row:hover { background: rgba(196,181,253,0.04) !important; }
  .agent-row.attr-Physical-row { border-left-color: rgba(255,213,79,0.35); }
  .agent-row.attr-Fire-row { border-left-color: rgba(255,138,101,0.35); }
  .agent-row.attr-Electric-row { border-left-color: rgba(129,199,132,0.35); }
  .agent-row.attr-Ice-row { border-left-color: rgba(100,181,246,0.35); }
  .agent-row.attr-Ether-row { border-left-color: rgba(206,147,216,0.35); }

  .agent-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .agent-name { font-size: 14px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }

  .attr-chip { padding: 2px 9px; border-radius: 10px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .attr-Physical { background: #3d3520; color: #ffd54f; border: 1px solid #ffd54f33; }
  .attr-Fire { background: #3d1f1a; color: #ff8a65; border: 1px solid #ff8a6533; }
  .attr-Electric { background: #1a2e1a; color: #81c784; border: 1px solid #81c78433; }
  .attr-Ice { background: #1a2a3d; color: #64b5f6; border: 1px solid #64b5f633; }
  .attr-Ether { background: #2a1a3d; color: #ce93d8; border: 1px solid #ce93d833; }

  .agent-notes { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .badge {
    padding: 3px 10px; border-radius: 6px; font-size: 12px;
    font-weight: 700; text-align: center; min-width: 38px;
    border: 1px solid rgba(255,255,255,0.06); transition: box-shadow 0.2s;
  }
  .badge-ms { background: rgba(255,255,255,0.04); color: #888; }
  .badge-ms.high {
    background: rgba(255,183,77,0.15); color: #ffb74d;
    border-color: rgba(255,183,77,0.2); box-shadow: 0 0 8px rgba(255,183,77,0.15);
  }
  .badge-we { background: rgba(255,255,255,0.04); color: #999; }
  .badge-we.high {
    background: rgba(196,181,253,0.12); color: var(--accent);
    border-color: rgba(196,181,253,0.2); box-shadow: 0 0 8px rgba(196,181,253,0.12);
  }
  .badge-lv {
    padding: 3px 8px; font-size: 11px; font-weight: 700;
    background: rgba(102,187,106,0.1); color: var(--green-text);
    border: 1px solid rgba(102,187,106,0.15); border-radius: 6px;
  }
  .disc-text { font-size: 10px; color: #7b7394; max-width: 170px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .disc-empty { font-size: 10px; color: #3a3650; }

  .agent-portrait {
    width: 52px; height: 52px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .agent-row:hover .agent-portrait {
    border-color: rgba(196,181,253,0.3);
    transform: scale(1.08); box-shadow: 0 0 12px rgba(196,181,253,0.15);
  }
  .audit-portrait {
    width: 38px; height: 38px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }

  .summary-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 110px; padding: 14px 18px; border-radius: 12px; }
  .summary-num { font-size: 26px; font-weight: 900; }
  .summary-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; margin-top: 2px; }

  .legend {
    display: flex; gap: 18px; padding: 9px 16px; margin-bottom: 16px;
    background: rgba(255,255,255,0.02); border-radius: 8px;
    font-size: 11px; color: #888; flex-wrap: wrap;
  }

  .audit-card {
    background: var(--bg-card); border: 1px solid var(--border-subtle);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
    transition: all 0.2s; border-left: 3px solid #444;
  }
  .audit-card:hover { background: rgba(196,181,253,0.03); }
  .audit-card.status-green { border-left-color: var(--green-border); }
  .audit-card.status-yellow { border-left-color: var(--yellow-border); }
  .audit-card.status-red { border-left-color: var(--red-border); }

  .audit-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px 6px; flex-wrap: wrap; gap: 6px;
  }
  .audit-agent-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .audit-type { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }

  .priority-badge { padding: 3px 11px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }
  .priority-green { background: var(--green-bg); color: var(--green-text); border: 1px solid rgba(46,125,50,0.25); }
  .priority-yellow { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid rgba(255,160,0,0.2); }
  .priority-red { background: var(--red-bg); color: var(--red-text); border: 1px solid rgba(198,40,40,0.25); }
  .priority-neutral { background: rgba(255,255,255,0.04); color: #888; border: 1px solid rgba(255,255,255,0.06); }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; padding: 6px 16px 12px; }

  .stat-cell { padding: 9px 11px; border-radius: 8px; cursor: pointer; transition: all 0.15s; position: relative; }
  .stat-cell:hover { filter: brightness(1.15); }
  .stat-cell.green { background: var(--green-bg); border: 1px solid rgba(46,125,50,0.2); }
  .stat-cell.yellow { background: var(--yellow-bg); border: 1px solid rgba(255,160,0,0.15); }
  .stat-cell.red { background: var(--red-bg); border: 1px solid rgba(198,40,40,0.2); }

  .stat-label { font-size: 10px; color: #888; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
  .stat-value { font-size: 17px; font-weight: 800; }
  .stat-value.green { color: var(--green-text); }
  .stat-value.yellow { color: var(--yellow-text); }
  .stat-value.red { color: var(--red-text); }
  .stat-optimal { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

  .stat-input {
    width: 100%; font-family: inherit; font-size: 17px; font-weight: 800;
    background: rgba(0,0,0,0.4); border: 2px solid var(--accent);
    border-radius: 6px; color: #fff; padding: 2px 6px; outline: none;
  }

  .delta-row { display: flex; gap: 12px; padding: 4px 16px 10px; font-size: 11px; }
  .delta-before { color: var(--text-muted); }
  .delta-value { color: #64b5f6; font-weight: 700; }

  .session-toggle {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border: none; cursor: pointer; font-family: inherit;
    background: linear-gradient(90deg, rgba(13,13,26,0.95), rgba(13,13,26,0.6));
    border-left: 3px solid var(--accent); transition: all 0.2s;
  }
  .session-toggle.expanded { border-radius: 10px 10px 0 0; }
  .session-toggle.collapsed { border-radius: 10px; }
  .session-label { font-size: 13px; font-weight: 800; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }

  .session-body {
    background: rgba(255,255,255,0.015); border-radius: 0 0 10px 10px;
    border: 1px solid var(--border-subtle); border-top: none;
    overflow: hidden; animation: fadeSlideIn 0.3s ease-out;
  }
  .session-row {
    display: grid; grid-template-columns: 170px 1fr;
    padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px;
  }
  .session-row:nth-child(odd) { background: rgba(255,255,255,0.01); }
  .session-row-label { font-weight: 700; color: #ccc; }

  .edit-hint { font-size: 10px; color: var(--text-muted); font-style: italic; padding: 0 16px 10px; letter-spacing: 0.3px; }
  .hidden { display: none; }

  .export-btn {
    padding: 8px 18px; border: 1px solid var(--accent);
    border-radius: 8px; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase;
    background: rgba(196,181,253,0.08); color: var(--accent);
    transition: all 0.25s; margin-left: 8px;
  }
  .export-btn:hover { background: rgba(196,181,253,0.2); }
  .export-btn.saved { border-color: var(--green-text); color: var(--green-text); background: rgba(46,125,50,0.15); }

  .dirty-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--yellow-text); display: inline-block;
    margin-left: 6px; animation: pulse 1.5s infinite;
  }
  .export-btn.dirty { animation: exportGlow 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes exportGlow { 0%, 100% { box-shadow: 0 0 4px rgba(255,183,77,0.2); } 50% { box-shadow: 0 0 12px rgba(255,183,77,0.4); } }

  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: var(--text-muted); font-size: 14px; letter-spacing: 1px;
  }
  .loading::after {
    content: ''; width: 20px; height: 20px; margin-left: 12px;
    border: 2px solid var(--accent); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    .agent-row { grid-template-columns: 1fr auto auto; gap: 8px; }
    .agent-row .disc-text, .agent-row .disc-empty { display: none; }
    .agent-portrait { width: 40px; height: 40px; }
    .stats-grid { grid-template-columns: 1fr; }
    .session-row { grid-template-columns: 1fr; gap: 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="title">Andres's ZZZ Dashboard</div>
      <div class="subtitle" id="subtitle">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('roster')">Agent Roster</button>
        <button class="tab" onclick="switchTab('audit')">Stat Audit</button>
      </div>
      <button class="export-btn" id="export-btn" onclick="exportData()" title="Export updated data.json">EXPORT</button>
    </div>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="content">
  <div id="roster-view"><div class="loading">Loading roster</div></div>
  <div id="audit-view" class="hidden"></div>
</div>

<script>
const PORTRAIT_MAP = {
  "Ye Shunguang": "ye_shunguang.png", "Evelyn": "evelyn.png", "Seed": "Seed.png",
  "Soldier 0 Anby": "soldier0anby.png", "Ellen": "ellen.png", "Jane Doe": "janedoe.png",
  "Alice": "alice.png", "Miyabi": "miyabi.png", "Vivian": "vivian.png",
  "Burnice": "burnice.png", "Aria": "aria.png", "Dialyn": "dialyn.png",
  "Ju Fufu": "jufufu.png", "Trigger": "trigger.png", "Lighter": "lighter.png",
  "Nangong Yu": "nangongyu.png", "Astra Yao": "astrayao.png", "Lucia": "lucia.png",
  "Yuzuha": "yuzuha.png", "Sunna": "sunna.png", "Zhao": "zhao.png",
  "Yidhari": "yidhari.png", "Yixuan": "yixuan.png"
};

const ATTR_COLORS = {
  Physical: { color: "#ffd54f", bg: "#3d3520" },
  Fire:     { color: "#ff8a65", bg: "#3d1f1a" },
  Electric: { color: "#81c784", bg: "#1a2e1a" },
  Ice:      { color: "#64b5f6", bg: "#1a2a3d" },
  Ether:    { color: "#ce93d8", bg: "#2a1a3d" }
};

function getPortraitSrc(name) {
  return PORTRAIT_MAP[name] ? "Portraits/" + PORTRAIT_MAP[name] : null;
}

function makePortrait(name, attr, size, cssClass) {
  const src = getPortraitSrc(name);
  const ac = ATTR_COLORS[attr] || { color: "#888", bg: "#222" };
  if (src) {
    const img = e('img', { class: cssClass, src: src, alt: name, style: "border-color:" + ac.color + "44;" });
    img.onerror = function() { this.replaceWith(makePortraitFallback(name, attr, size, cssClass)); };
    return img;
  }
  return makePortraitFallback(name, attr, size, cssClass);
}

function makePortraitFallback(name, attr, size, cssClass) {
  const ac = ATTR_COLORS[attr] || { color: "#888", bg: "#222" };
  const initials = name.split(' ').map(function(w) { return w[0]; }).join('').slice(0,2);
  return e('div', {
    class: cssClass,
    style: "width:" + size + "px;height:" + size + "px;display:flex;align-items:center;justify-content:center;" +
           "background:" + ac.bg + ";color:" + ac.color + ";font-weight:800;font-size:" + Math.round(size*0.36) + "px;" +
           "letter-spacing:1px;border-color:" + ac.color + "44;"
  }, initials);
}

let AGENTS = [], AUDIT = [], SESSION = [], DATA_META = {}, isDirty = false;
const SECTIONS = ["ATTACK","ANOMALY","STUN","SUPPORT","RAPTURE"];
const SECTION_ICONS = { ATTACK:"\u2694\uFE0F", ANOMALY:"\u2623\uFE0F", STUN:"\u26A1", SUPPORT:"\uD83D\uDCAB", RAPTURE:"\uD83D\uDD2E" };
const STATUS_TEXT_COLORS = { green:"var(--green-text)", yellow:"var(--yellow-text)", red:"var(--red-text)", neutral:"#888" };

let currentTab = "roster", sectionFilter = "ALL", attrFilter = "ALL";
let expandedSections = new Set(SECTIONS), sessionOpen = false;

async function loadData() {
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    DATA_META = data.meta || {};
    AGENTS = data.agents || [];
    AUDIT = data.audit || [];
    SESSION = data.sessions || [];

    const updatedStr = DATA_META.updated || 'N/A';
    let relativeDate = updatedStr;
    try {
      const updated = new Date(updatedStr + 'T00:00:00');
      const now = new Date();
      const diffDays = Math.floor((now - updated) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) relativeDate = 'today';
      else if (diffDays === 1) relativeDate = 'yesterday';
      else if (diffDays < 7) relativeDate = diffDays + ' days ago';
      else if (diffDays < 30) relativeDate = Math.floor(diffDays/7) + ' week' + (Math.floor(diffDays/7)>1?'s':'') + ' ago';
      else relativeDate = updatedStr;
    } catch(ex) {}

    document.getElementById('subtitle').textContent =
      AGENTS.length + ' S-Rank Agents \u00b7 All Level ' + (DATA_META.maxLevel || 60) + ' \u00b7 Updated ' + relativeDate;

    isDirty = false;
    updateExportBtn();
    renderFilters();
    renderRoster();
  } catch (err) {
    document.getElementById('roster-view').innerHTML =
      '<div class="loading" style="color:var(--red-text)">Failed to load data.json \u2014 ' + err.message + '</div>';
  }
}

function exportData() {
  const exportObj = { meta: Object.assign({}, DATA_META, { updated: new Date().toISOString().split('T')[0] }), agents: AGENTS, audit: AUDIT, sessions: SESSION };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  isDirty = false; updateExportBtn();
  const btn = document.getElementById('export-btn');
  btn.classList.add('saved'); btn.classList.remove('dirty'); btn.textContent = 'SAVED';
  setTimeout(function() { btn.classList.remove('saved'); btn.textContent = 'EXPORT'; }, 2000);
}

function markDirty() { isDirty = true; updateExportBtn(); }

function updateExportBtn() {
  const btn = document.getElementById('export-btn');
  if (!btn) return;
  const existingDot = btn.querySelector('.dirty-dot');
  if (isDirty && !existingDot) {
    const dot = document.createElement('span');
    dot.className = 'dirty-dot'; dot.title = 'Unsaved changes';
    btn.appendChild(dot); btn.classList.add('dirty');
  } else if (!isDirty && existingDot) {
    existingDot.remove(); btn.classList.remove('dirty');
  }
}

function parseNum(str) { return parseFloat(String(str).replace(/[,%\u25b2 ]/g, '')); }

function getStatStatus(stat) {
  const val = parseNum(stat.current);
  if (isNaN(val)) return "neutral";
  if (val >= stat.min) return "green";
  if (val >= stat.min * 0.9) return "yellow";
  return "red";
}

function recalcPriority(agent) {
  const statuses = agent.stats.map(getStatStatus);
  if (statuses.every(function(s) { return s === "green"; })) return "green";
  if (statuses.some(function(s) { return s === "red"; })) return "red";
  return "yellow";
}

function e(tag, attrs) {
  var children = Array.prototype.slice.call(arguments, 2);
  const el = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    var v = attrs[k];
    if (k === "class") el.className = v;
    else if (k.indexOf("on") === 0) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(function(c) {
    if (typeof c === "string") el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.textContent.toLowerCase().indexOf(tab) >= 0); });
  document.getElementById('roster-view').classList.toggle('hidden', tab !== 'roster');
  document.getElementById('audit-view').classList.toggle('hidden', tab !== 'audit');
  renderFilters();
  if (tab === 'audit') renderAudit();
}

function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = '';
  if (currentTab !== 'roster') return;
  const counts = {};
  SECTIONS.forEach(function(s) { counts[s] = AGENTS.filter(function(a) { return a.section === s; }).length; });

  ["ALL"].concat(SECTIONS).forEach(function(s) {
    const label = s === "ALL" ? "ALL (" + AGENTS.length + ")" : SECTION_ICONS[s] + " " + s + " (" + counts[s] + ")";
    const btn = e('button', { class: "filter-btn" + (sectionFilter===s?" active":""), onClick: function() { sectionFilter=s; renderFilters(); renderRoster(); }}, label);
    container.appendChild(btn);
  });
  container.appendChild(e('div', { class:'filter-sep' }));

  ["ALL","Physical","Fire","Electric","Ice","Ether"].forEach(function(a) {
    const btn = e('button', { class: "filter-btn" + (attrFilter===a?" active":""), onClick: function() { attrFilter=a; renderFilters(); renderRoster(); }}, a === "ALL" ? "All Attr" : a);
    container.appendChild(btn);
  });
}

function renderRoster() {
  const container = document.getElementById('roster-view');
  container.innerHTML = '';
  const filtered = AGENTS.filter(function(a) {
    if (sectionFilter !== "ALL" && a.section !== sectionFilter) return false;
    if (attrFilter !== "ALL" && a.attribute !== attrFilter) return false;
    return true;
  });
  const visibleSections = SECTIONS.filter(function(s) { return filtered.some(function(a) { return a.section === s; }); });
  const totalAgents = AGENTS.length;

  visibleSections.forEach(function(section) {
    const sAgents = filtered.filter(function(a) { return a.section === section; });
    const allSectionAgents = AGENTS.filter(function(a) { return a.section === section; });
    const isOpen = expandedSections.has(section);
    const progressPct = (allSectionAgents.length / totalAgents * 100).toFixed(1);

    const wrapper = e('div', { style:'margin-bottom:12px' });
    const header = e('button', {
      class: "section-header " + (isOpen ? 'expanded' : 'collapsed'),
      onClick: function() { isOpen ? expandedSections.delete(section) : expandedSections.add(section); renderRoster(); }
    },
      e('span', { class:'section-icon' }, SECTION_ICONS[section]),
      e('span', { class:'section-label' }, section),
      e('span', { class:'section-count' }, "(" + sAgents.length + ")"),
      e('span', { class: "section-chevron" + (isOpen?" open":"") }, '\u25bc'),
      e('div', { class:'section-progress', style: "width:" + progressPct + "%" })
    );
    wrapper.appendChild(header);

    if (isOpen) {
      const body = e('div', { class:'section-body' });
      sAgents.forEach(function(agent) {
        const msNum = parseInt(agent.mindscape.replace('M',''));
        const weNum = parseInt(agent.wengine.replace('W',''));
        const row = e('div', { class: "agent-row attr-" + agent.attribute + "-row" },
          e('div', { class:'agent-info' },
            makePortrait(agent.name, agent.attribute, 52, 'agent-portrait'),
            e('span', { class:'agent-name' }, agent.name),
            e('span', { class: "attr-chip attr-" + agent.attribute }, agent.attribute),
            agent.notes ? e('span', { class:'agent-notes' }, agent.notes) : null
          ),
          e('div', { class: "badge badge-ms" + (msNum>=2?" high":"") }, agent.mindscape),
          e('div', { class: "badge badge-we" + (weNum>=1?" high":"") }, agent.wengine),
          e('div', { class:'badge-lv' }, "Lv." + agent.level),
          agent.discs ? e('div', { class:'disc-text' }, agent.discs) : e('div', { class:'disc-empty' }, '\u2014')
        );
        body.appendChild(row);
      });
      wrapper.appendChild(body);
    }
    container.appendChild(wrapper);
  });
}

function renderAudit() {
  const container = document.getElementById('audit-view');
  container.innerHTML = '';
  AUDIT.forEach(function(a) { a.stats.forEach(function(s) { s._status = getStatStatus(s); }); a._calcPriority = recalcPriority(a); });

  const done = AUDIT.filter(function(a) { return a._calcPriority === "green"; }).length;
  const mid = AUDIT.filter(function(a) { return a._calcPriority === "yellow"; }).length;
  const crit = AUDIT.filter(function(a) { return a._calcPriority === "red"; }).length;

  container.appendChild(e('div', { class:'summary-bar' },
    e('div', { class:'summary-card', style:'background:var(--green-bg);border:1px solid rgba(46,125,50,0.2)' },
      e('div', { class:'summary-num', style:'color:var(--green-text)' }, String(done)),
      e('div', { class:'summary-label', style:'color:rgba(102,187,106,0.7)' }, 'Perfect')),
    e('div', { class:'summary-card', style:'background:var(--yellow-bg);border:1px solid rgba(255,160,0,0.15)' },
      e('div', { class:'summary-num', style:'color:var(--yellow-text)' }, String(mid)),
      e('div', { class:'summary-label', style:'color:rgba(255,183,77,0.7)' }, 'Needs Work')),
    e('div', { class:'summary-card', style:'background:var(--red-bg);border:1px solid rgba(198,40,40,0.2)' },
      e('div', { class:'summary-num', style:'color:var(--red-text)' }, String(crit)),
      e('div', { class:'summary-label', style:'color:rgba(239,83,80,0.7)' }, 'Critical'))
  ));

  container.appendChild(e('div', { class:'legend' },
    e('span', null, e('span', { style:'color:var(--green-text);margin-right:4px' }, '\u25a0'), 'At/Above Target'),
    e('span', null, e('span', { style:'color:var(--yellow-text);margin-right:4px' }, '\u25a0'), 'Close / Workable'),
    e('span', null, e('span', { style:'color:var(--red-text);margin-right:4px' }, '\u25a0'), 'Below Target'),
    e('span', null, e('span', { style:'color:#64b5f6;margin-right:4px' }, '\u25b2'), 'Improved')
  ));

  container.appendChild(e('div', { class:'edit-hint' }, 'Click any stat value to edit it \u2014 colors update automatically. Hit EXPORT to save changes.'));

  AUDIT.forEach(function(agent, ai) {
    const pStatus = agent._calcPriority;
    const card = e('div', { class: "audit-card status-" + pStatus });
    const rosterAgent = AGENTS.find(function(a) { return a.name === agent.name; });
    const agentAttr = rosterAgent ? rosterAgent.attribute : 'Physical';

    card.appendChild(e('div', { class:'audit-header' },
      e('div', { style:'display:flex;align-items:center;gap:10px' },
        makePortrait(agent.name, agentAttr, 38, 'audit-portrait'),
        e('span', { class:'audit-agent-name' }, agent.name),
        e('span', { class:'audit-type' }, agent.type)),
      e('div', { class: "priority-badge priority-" + pStatus }, agent.priority)
    ));

    const grid = e('div', { class:'stats-grid' });
    agent.stats.forEach(function(stat, si) {
      const status = stat._status;
      const cell = e('div', { class: "stat-cell " + status });
      cell.appendChild(e('div', { class:'stat-label' }, stat.label));
      const valueEl = e('div', { class: "stat-value " + status, style:'cursor:pointer' }, stat.current + (stat.note ? " " + stat.note : ""));
      valueEl.addEventListener('click', function() { startEdit(ai, si, cell, valueEl); });
      cell.appendChild(valueEl);
      cell.appendChild(e('div', { class:'stat-optimal' }, "Target: " + stat.optimal));
      grid.appendChild(cell);
    });
    card.appendChild(grid);

    if (agent.delta) {
      card.appendChild(e('div', { class:'delta-row' },
        e('span', { class:'delta-before' }, agent.before),
        e('span', { class:'delta-value' }, agent.delta)
      ));
    }
    container.appendChild(card);
  });

  const sessWrapper = e('div', { style:'margin-top:24px' });
  sessWrapper.appendChild(e('button', {
    class: "session-toggle " + (sessionOpen?'expanded':'collapsed'),
    onClick: function() { sessionOpen = !sessionOpen; renderAudit(); }
  },
    e('span', { class:'session-label' }, 'Session Results \u2014 March 14, 2026'),
    e('span', { class: "section-chevron" + (sessionOpen?" open":""), style:'margin-left:auto' }, '\u25bc')
  ));

  if (sessionOpen) {
    const sessBody = e('div', { class:'session-body' });
    SESSION.forEach(function(s) {
      sessBody.appendChild(e('div', { class:'session-row' },
        e('span', { class:'session-row-label' }, s.label),
        e('span', { style: "color:" + STATUS_TEXT_COLORS[s.status] }, s.detail)
      ));
    });
    sessWrapper.appendChild(sessBody);
  }
  container.appendChild(sessWrapper);
}

function startEdit(agentIdx, statIdx, cell, valueEl) {
  const stat = AUDIT[agentIdx].stats[statIdx];
  const raw = String(stat.current).replace(/[\u25b2 ]/g, '').trim();
  const input = e('input', { class:'stat-input', value: raw });
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') finishEdit(agentIdx, statIdx, input.value);
    if (ev.key === 'Escape') renderAudit();
  });
  input.addEventListener('blur', function() { finishEdit(agentIdx, statIdx, input.value); });
  valueEl.replaceWith(input); input.focus(); input.select();
}

function finishEdit(agentIdx, statIdx, rawValue) {
  const stat = AUDIT[agentIdx].stats[statIdx];
  const cleaned = rawValue.replace(/[,%]/g, '').trim();
  const numVal = parseFloat(cleaned);
  if (!isNaN(numVal)) {
    stat.current = stat.unit === '%' ? numVal + '%' : (numVal >= 1000 ? numVal.toLocaleString() : String(numVal));
    markDirty();
  }
  renderAudit();
}

loadData();
</script>
